<style>
  :root{
    --bg:#140e26; --bg2:#1d1440; --panel:#241a4d; --panel2:#2e2260;
    --ink:#efe9ff; --muted:#9d92c9; --line:#3a2d6e;
    --gold:#ffd257; --gold2:#ffb23e; --xp:#54d6ff; --xp2:#3a8bff;
    --hp:#ff5c7a; --green:#5ee6a0; --shadow:0 4px 0 rgba(0,0,0,.35);
    --heat0:#221a45; --heat1:#3b5c48; --heat2:#4f9866; --heat3:#5ee6a0;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html,body{margin:0; height:100%}
  body{
    font-family:ui-monospace,"SF Mono",Menlo,Consolas,"DejaVu Sans Mono",monospace;
    background:
      radial-gradient(1200px 500px at 50% -10%, #2a1e5a 0%, transparent 60%),
      linear-gradient(180deg,var(--bg) 0%, var(--bg2) 100%);
    color:var(--ink); min-height:100%;
    padding:env(safe-area-inset-top) 0 0 0;
    -webkit-font-smoothing:none;
  }
  .wrap{max-width:520px; margin:0 auto; padding:14px 14px 90px; position:relative}
  h1,h2,h3{margin:0; letter-spacing:.5px}
  .pix{text-shadow:2px 2px 0 rgba(0,0,0,.5)}

  /* ---- Header / status ---- */
  .status{
    background:linear-gradient(180deg,var(--panel2),var(--panel));
    border:2px solid var(--line); border-radius:14px; padding:14px;
    box-shadow:var(--shadow); position:relative; overflow:hidden;
  }
  .status .title{font-size:12px; color:var(--gold); letter-spacing:2px}
  .heroRow{display:flex; gap:14px; align-items:center; margin-top:8px}
  .heroBox{
    width:88px; height:88px; flex:0 0 auto; border-radius:12px;
    background:radial-gradient(circle at 50% 35%, #3b2d78, #1b1440);
    border:2px solid var(--line); display:grid; place-items:center;
    image-rendering:pixelated;
  }
  .heroBox svg{width:70px; height:70px; image-rendering:pixelated}
  .heroInfo{flex:1; min-width:0}
  .lvline{display:flex; align-items:baseline; gap:8px; flex-wrap:wrap}
  .lv{font-size:22px; color:var(--gold); font-weight:700}
  .cls{font-size:12px; color:var(--muted)}
  .bar{height:14px; border-radius:8px; background:#160f30; border:1px solid var(--line);
    overflow:hidden; margin-top:8px; position:relative}
  .bar > i{display:block; height:100%; width:0;
    background:linear-gradient(180deg,var(--xp),var(--xp2)); transition:width .5s ease}
  .bar .lab{position:absolute; inset:0; display:grid; place-items:center;
    font-size:9px; color:#dff6ff; text-shadow:1px 1px 0 rgba(0,0,0,.6)}
  .chips{display:flex; gap:8px; margin-top:10px; flex-wrap:wrap}
  .chip{font-size:11px; background:#180f36; border:1px solid var(--line);
    padding:5px 9px; border-radius:20px; color:var(--muted)}
  .chip b{color:var(--ink)}
  .hearts{letter-spacing:2px; font-size:13px}

  /* ---- Tabs ---- */
  .tabs{display:flex; gap:8px; margin:16px 0 12px}
  .tab{flex:1; text-align:center; padding:10px; border-radius:10px; font-size:13px;
    background:var(--panel); border:2px solid var(--line); color:var(--muted);
    box-shadow:var(--shadow); cursor:pointer; user-select:none}
  .tab.on{color:#241a4d; background:linear-gradient(180deg,var(--gold),var(--gold2));
    border-color:var(--gold2); font-weight:700}

  /* ---- Quests ---- */
  .quest{
    background:var(--panel); border:2px solid var(--line); border-radius:12px;
    padding:12px; margin-bottom:12px; box-shadow:var(--shadow); position:relative;
    transition:border-color .2s, background .2s;
  }
  .quest.done{border-color:var(--green); background:#1c2b3a}
  .qtop{display:flex; gap:10px; align-items:flex-start}
  .qemoji{font-size:26px; line-height:1}
  .qbody{flex:1; min-width:0}
  .qname{font-size:15px; font-weight:700}
  .qdesc{font-size:11px; color:var(--muted); margin-top:3px; line-height:1.5}
  .qxp{font-size:10px; color:var(--gold); margin-top:6px}
  .check{
    width:34px; height:34px; flex:0 0 auto; border-radius:9px; cursor:pointer;
    border:2px solid var(--line); background:#160f30; display:grid; place-items:center;
    font-size:18px; color:transparent; transition:.15s;
  }
  .quest.done .check{background:var(--green); border-color:var(--green); color:#0c261a}
  .stepper{display:flex; align-items:center; gap:0; margin-top:10px;
    background:#160f30; border:1px solid var(--line); border-radius:10px; width:max-content}
  .stepper button{width:38px; height:34px; border:0; background:transparent; color:var(--gold);
    font-size:20px; cursor:pointer; font-family:inherit}
  .stepper .n{min-width:52px; text-align:center; font-size:14px}
  .stepper .unit{font-size:10px; color:var(--muted); padding:0 10px 0 2px}

  /* ---- Calendar ---- */
  .calhead{display:flex; align-items:center; justify-content:space-between; margin-bottom:10px}
  .calhead button{width:40px; height:36px; border-radius:9px; border:2px solid var(--line);
    background:var(--panel); color:var(--gold); font-size:18px; cursor:pointer; box-shadow:var(--shadow)}
  .calhead .mon{font-size:15px; color:var(--gold)}
  .cal{display:grid; grid-template-columns:repeat(7,1fr); gap:5px}
  .dow{font-size:10px; color:var(--muted); text-align:center; padding-bottom:2px}
  .cell{aspect-ratio:1; border-radius:8px; background:var(--heat0); border:1px solid var(--line);
    position:relative; display:grid; place-items:center; font-size:11px; color:var(--muted); cursor:default}
  .cell.h1{background:var(--heat1); color:#dfeee7}
  .cell.h2{background:var(--heat2); color:#0c261a}
  .cell.h3{background:var(--heat3); color:#0c261a; border-color:var(--green)}
  .cell.today{outline:2px solid var(--gold); outline-offset:1px}
  .cell.has{cursor:pointer}
  .cell .star{position:absolute; top:1px; right:3px; font-size:9px}
  .cell.empty{background:transparent; border:0}
  .calsum{display:flex; gap:8px; margin-top:14px; flex-wrap:wrap}
  .calsum .box{flex:1; min-width:90px; background:var(--panel); border:2px solid var(--line);
    border-radius:10px; padding:10px; text-align:center; box-shadow:var(--shadow)}
  .calsum .box b{display:block; font-size:20px; color:var(--gold)}
  .calsum .box span{font-size:10px; color:var(--muted)}

  /* ---- Popover ---- */
  .pop{position:fixed; inset:0; background:rgba(8,5,20,.6); display:none;
    place-items:center; z-index:40; padding:20px}
  .pop.on{display:grid}
  .popcard{background:var(--panel2); border:2px solid var(--line); border-radius:14px;
    padding:18px; max-width:320px; width:100%; box-shadow:0 10px 30px rgba(0,0,0,.5)}
  .popcard h3{font-size:14px; color:var(--gold); margin-bottom:12px}
  .poprow{display:flex; justify-content:space-between; font-size:13px; padding:7px 0;
    border-bottom:1px dashed var(--line)}
  .poprow:last-of-type{border-bottom:0}
  .popcard button{margin-top:14px; width:100%; padding:11px; border-radius:10px; border:0;
    background:linear-gradient(180deg,var(--gold),var(--gold2)); color:#241a4d; font-weight:700;
    font-family:inherit; font-size:14px; cursor:pointer}

  /* ---- Toast / levelup ---- */
  #toast{position:fixed; left:50%; top:16%; transform:translateX(-50%) scale(.8);
    background:linear-gradient(180deg,var(--gold),var(--gold2)); color:#241a4d;
    font-weight:700; padding:14px 22px; border-radius:12px; font-size:16px; z-index:60;
    opacity:0; pointer-events:none; transition:.35s; box-shadow:0 8px 24px rgba(0,0,0,.5);
    text-align:center; border:2px solid #fff3d0}
  #toast.show{opacity:1; transform:translateX(-50%) scale(1)}
  #toast small{display:block; font-size:11px; font-weight:400; margin-top:2px}
  #flash{position:fixed; inset:0; background:#fff; opacity:0; pointer-events:none; z-index:50}
  #flash.go{animation:fl .5s ease}
  @keyframes fl{0%{opacity:0}20%{opacity:.55}100%{opacity:0}}
  .footer{text-align:center; font-size:10px; color:var(--muted); margin-top:20px; line-height:1.7}
  .view{display:none} .view.on{display:block}
</style>

<div class="wrap">
  <!-- STATUS -->
  <div class="status">
    <div class="title pix">◆ eBay SELLER QUEST ◆</div>
    <div class="heroRow">
      <div class="heroBox" id="heroBox"></div>
      <div class="heroInfo">
        <div class="lvline">
          <span class="lv pix" id="lvNum">Lv.1</span>
          <span class="cls" id="clsName">見習いセラー</span>
        </div>
        <div class="bar"><i id="xpFill"></i><span class="lab" id="xpLab">0 / 100 XP</span></div>
        <div class="chips">
          <span class="chip">🔥 連続 <b id="streak">0</b>日</span>
          <span class="chip">今日の気力 <span class="hearts" id="hearts">♡♡♡</span></span>

  <!-- TABS -->

      <div class="box"><b id="sumDays">0</b><span>稼働日</span></div>
      <div class="box"><b id="sumItems">0</b><span>合計件数</span></div>

  <div class="footer">
    データはこの端末内だけに保存されます。<br>
    ホーム画面に追加してアプリのように使えます。
  </div>
</div>

<div class="pop" id="pop" onclick="if(event.target===this)closePop()">
  <div class="popcard">
    <h3 id="popTitle"></h3>
    <div id="popBody"></div>
    <button onclick="closePop()">とじる</button>
  </div>
</div>
<div id="toast"></div>
<div id="flash"></div>

<script>
/* ============ Data / constants ============ */
const KEY='ebayQuestSave';
const QUESTS=[
  {id:'research',  emoji:'🔍', name:'新規出品リサーチ', unit:'候補',
   desc:'テラピークで90日2個以上売れた商品を探し、国内在庫と相場から出品候補を洗い出す。'},
  {id:'pricecheck',emoji:'💰', name:'最安値チェック',   unit:'件',
   desc:'自分の出品が検索内で最安値か確認。同条件で負けていれば価格見直しを検討。'},
  {id:'restock',   emoji:'📦', name:'在庫補充',         unit:'件',
   desc:'在庫切れ商品を特定し、国内在庫と利益を確認して再出品・補充する。'},
];
const XP_DONE=20, XP_PER_ITEM=5, ITEM_CAP=20;
const CLASSES=[ // level threshold -> class name + hero tier
  {min:20, name:'マスターセラー', tier:3},
  {min:10, name:'ベテランセラー', tier:2},
  {min:5,  name:'熟練セラー',     tier:1},
  {min:1,  name:'見習いセラー',   tier:0},
];
function xpForLevel(lv){return 50 + lv*50;}
function todayStr(d){d=d||new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function addDays(str,n){const [y,m,d]=str.split('-').map(Number); const dt=new Date(y,m-1,d); dt.setDate(dt.getDate()+n); return todayStr(dt);}

/* ============ State ============ */
let S=load();

function freshQuests(){return {research:{done:false,count:0},pricecheck:{done:false,count:0},restock:{done:false,count:0}};}
function defaultState(){
  return {level:1, xp:0, totalXp:0, streak:0, bestStreak:0,
    lastCompletedDate:null, todayDate:todayStr(), quests:freshQuests(), history:{}};
}
function load(){
  try{const s=JSON.parse(localStorage.getItem(KEY)); if(s&&s.quests){ // migrate missing keys
    return Object.assign(defaultState(), s);}}catch(e){}
  return defaultState();
}
function save(){localStorage.setItem(KEY, JSON.stringify(S));}

/* Roll over the day: commit yesterday's progress into history, reset quests, handle streak */
function rollover(){
  const today=todayStr();
  if(S.todayDate!==today){
    // finalize the stored day into history (already mirrored, but ensure)
    commitToHistory(S.todayDate);
    // streak: was yesterday a completed day?
    if(S.lastCompletedDate && S.lastCompletedDate!==today){
      if(S.lastCompletedDate < addDays(today,-1)) S.streak=0; // gap of 2+ days
    }
    S.quests=freshQuests();
    S.todayDate=today;
    save();
  }
}
function daySummary(q){
  let done=0, items=0, xp=0;
  for(const k in q){ if(q[k].done){done++; xp+=XP_DONE;} const c=Math.min(q[k].count,ITEM_CAP); items+=q[k].count; xp+=c*XP_PER_ITEM; }
  return {done, items, xp, counts:{research:q.research.count,pricecheck:q.pricecheck.count,restock:q.restock.count}};
}
function commitToHistory(date){
  const s=daySummary(S.quests);
  if(s.done>0 || s.items>0){ S.history[date]={done:s.done, counts:s.counts, xp:s.xp}; }
  else { delete S.history[date]; }
}

/* ============ Actions ============ */
function grantXpDelta(delta){
  if(delta===0) return;
  S.xp += delta; S.totalXp = Math.max(0, S.totalXp+delta);
  let leveled=0;
  while(S.xp >= xpForLevel(S.level)){ S.xp -= xpForLevel(S.level); S.level++; leveled++; }
  while(S.xp < 0 && S.level>1){ S.level--; S.xp += xpForLevel(S.level); } // undo across boundary
  if(S.xp<0) S.xp=0;
  if(leveled>0) levelUpFx(S.level);
}
// Called when today's FIRST quest gets completed
function markCompletedToday(){
  const today=todayStr();
  if(S.lastCompletedDate===today) return;       // already counted today
  S.streak = (S.lastCompletedDate===addDays(today,-1)) ? S.streak+1 : 1;
  S.lastCompletedDate=today;
  if(S.streak>S.bestStreak) S.bestStreak=S.streak;
}
// Called when today's LAST completed quest gets un-done
function unmarkToday(){
  const today=todayStr();
  if(S.lastCompletedDate!==today) return;
  S.streak=Math.max(0,S.streak-1);
  S.lastCompletedDate = S.streak>0 ? addDays(today,-1) : null;
}
function toggleQuest(id){
  rollover();
  const q=S.quests[id];
  const wasAny=Object.values(S.quests).some(x=>x.done);
  q.done=!q.done;
  grantXpDelta(q.done ? XP_DONE : -XP_DONE);
  const nowAny=Object.values(S.quests).some(x=>x.done);
  if(!wasAny && nowAny) markCompletedToday();
  else if(wasAny && !nowAny) unmarkToday();
  commitToHistory(S.todayDate);
  save(); render();
}
function step(id,delta){
  rollover();
  const q=S.quests[id];
  const before=Math.min(q.count,ITEM_CAP);
  q.count=Math.max(0, q.count+delta);
  const after=Math.min(q.count,ITEM_CAP);
  grantXpDelta((after-before)*XP_PER_ITEM);
  commitToHistory(S.todayDate);
  save(); render();
}

/* ============ Hero pixel art (inline SVG, 4 tiers) ============ */
function heroSVG(tier){
  // simple 11x11-ish pixel hero, palette shifts by tier
  const skin='#f6c89a', outline='#0c0820';
  const robe=['#6b8cff','#8b6bff','#e0603c','#ffd257'][tier];
  const robe2=['#3f5bd6','#5b3fd6','#b8401f','#e0a020'][tier];
  const hair=['#3a2d1a','#3a2d1a','#2a1a3a','#5a3a10'][tier];
  const gem=['#54d6ff','#8bffcf','#ff8bd6','#fff2a0'][tier];
  const crown = tier>=2;
  const P=(x,y,c)=>`<rect x="${x}" y="${y}" width="1" height="1" fill="${c}"/>`;
  let s=`<svg viewBox="0 0 11 12" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">`;
  // hair / crown row
  if(crown){ s+=P(3,0,'#ffd257')+P(5,0,'#ffd257')+P(7,0,'#ffd257')+P(4,0,'#ffb23e')+P(6,0,'#ffb23e'); }
  else { for(let x=3;x<=7;x++) s+=P(x,0,hair); }
  // head
  for(let x=3;x<=7;x++) s+=P(x,1,hair);
  s+=P(3,2,hair)+P(7,2,hair);
  for(let x=4;x<=6;x++) s+=P(x,2,skin);
  for(let x=3;x<=7;x++) s+=P(x,3,skin);
  s+=P(4,3,outline)+P(6,3,outline); // eyes
  for(let x=3;x<=7;x++) s+=P(x,4,skin);
  s+=P(5,4,'#d98');
  // body / robe
  for(let x=2;x<=8;x++) s+=P(x,5,robe);
  s+=P(5,5,gem);
  for(let x=2;x<=8;x++) s+=P(x,6,robe);
  s+=P(2,6,skin)+P(8,6,skin); // hands
  for(let x=3;x<=7;x++) s+=P(x,7,robe2);
  for(let x=3;x<=7;x++) s+=P(x,8,robe2);
  s+=P(5,8,robe);
  for(let x=3;x<=7;x++) s+=P(x,9,robe2);
  // legs
  s+=P(4,10,'#2a2350')+P(6,10,'#2a2350');
  s+=P(4,11,'#1a1540')+P(6,11,'#1a1540');
  s+=`</svg>`;
  return s;
}
function classFor(lv){ for(const c of CLASSES){ if(lv>=c.min) return c; } return CLASSES[CLASSES.length-1]; }

/* ============ Render ============ */
function render(){
  const cls=classFor(S.level);
  document.getElementById('heroBox').innerHTML=heroSVG(cls.tier);
  document.getElementById('lvNum').textContent='Lv.'+S.level;
  document.getElementById('clsName').textContent=cls.name;
  const need=xpForLevel(S.level);
  const pct=Math.max(0,Math.min(100, S.xp/need*100));
  document.getElementById('xpFill').style.width=pct+'%';
  document.getElementById('xpLab').textContent=S.xp+' / '+need+' XP';
  document.getElementById('streak').textContent=S.streak;
  document.getElementById('totalXp').textContent=S.totalXp;
  const doneCount=Object.values(S.quests).filter(q=>q.done).length;
  document.getElementById('hearts').textContent='♥'.repeat(doneCount)+'♡'.repeat(3-doneCount);

  // quests
  const v=document.getElementById('viewQuest');
  v.innerHTML=QUESTS.map(Q=>{
    const q=S.quests[Q.id];
    const itemXp=Math.min(q.count,ITEM_CAP)*XP_PER_ITEM;
    return `<div class="quest ${q.done?'done':''}">
      <div class="qtop">
        <div class="qemoji">${Q.emoji}</div>
        <div class="qbody">
          <div class="qname">${Q.name}</div>
          <div class="qdesc">${Q.desc}</div>
          <div class="qxp">完了 +${XP_DONE}XP ／ ${Q.unit}ごと +${XP_PER_ITEM}XP（現在 +${(q.done?XP_DONE:0)+itemXp}XP）</div>
        </div>
        <div class="check" onclick="toggleQuest('${Q.id}')">✓</div>
      </div>
      <div class="stepper">
        <button onclick="step('${Q.id}',-1)">−</button>
        <div class="n">${q.count}</div>
        <button onclick="step('${Q.id}',1)">＋</button>
        <div class="unit">${Q.unit}</div>
      </div>
    </div>`;
  }).join('');

  if(curView==='cal') renderCal();
}

/* ============ Level up FX ============ */
let audioCtx=null;
function beep(){
  try{ audioCtx=audioCtx||new (window.AudioContext||window.webkitAudioContext)();
    const notes=[660,880,1320]; notes.forEach((f,i)=>{
      const o=audioCtx.createOscillator(), g=audioCtx.createGain();
      o.type='square'; o.frequency.value=f; o.connect(g); g.connect(audioCtx.destination);
      const t=audioCtx.currentTime+i*0.09; g.gain.setValueAtTime(0.0001,t);
      g.gain.exponentialRampToValueAtTime(0.15,t+0.01); g.gain.exponentialRampToValueAtTime(0.0001,t+0.12);
      o.start(t); o.stop(t+0.13);
    });
  }catch(e){}
}
function levelUpFx(lv){
  const f=document.getElementById('flash'); f.classList.remove('go'); void f.offsetWidth; f.classList.add('go');
  const t=document.getElementById('toast');
  t.innerHTML='⭐ LEVEL UP！ Lv.'+lv+' ⭐<small>'+classFor(lv).name+'</small>';
  t.classList.add('show'); beep();
  clearTimeout(t._h); t._h=setTimeout(()=>t.classList.remove('show'),1900);
}

/* ============ Views ============ */
let curView='quest';
function showView(name){
  curView=name;
  document.getElementById('viewQuest').classList.toggle('on',name==='quest');
  document.getElementById('viewCal').classList.toggle('on',name==='cal');
  document.getElementById('tabQuest').classList.toggle('on',name==='quest');
  document.getElementById('tabCal').classList.toggle('on',name==='cal');
  if(name==='cal') renderCal();
}

/* ============ Calendar ============ */
let calY, calM; // month being viewed
(function initCal(){const n=new Date(); calY=n.getFullYear(); calM=n.getMonth();})();
function calMove(d){ calM+=d; if(calM<0){calM=11;calY--;} if(calM>11){calM=0;calY++;} renderCal(); }
function heatClass(done){ return done>=3?'h3':done===2?'h2':done>=1?'h1':''; }
function renderCal(){
  const today=todayStr();
  // ensure today's live progress reflected
  commitToHistory(S.todayDate);
  document.getElementById('calMon').textContent=calY+'年 '+(calM+1)+'月';
  const first=new Date(calY,calM,1).getDay();
  const days=new Date(calY,calM+1,0).getDate();
  const dow=['日','月','火','水','木','金','土'];
  let html=dow.map(d=>`<div class="dow">${d}</div>`).join('');
  for(let i=0;i<first;i++) html+=`<div class="cell empty"></div>`;
  let sumDays=0,sumItems=0,sumXp=0;
  for(let d=1;d<=days;d++){
    const ds=calY+'-'+String(calM+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const h=S.history[ds];
    const done=h?h.done:0;
    const items=h?(h.counts.research+h.counts.pricecheck+h.counts.restock):0;
    if(h){sumDays++; sumItems+=items; sumXp+=h.xp;}
    const cls=[ 'cell', heatClass(done), (ds===today?'today':''), (h?'has':'') ].filter(Boolean).join(' ');
    const star = done>=3?'<span class="star">🔥</span>':'';
    const onclick = h?`onclick="openDay('${ds}')"`:'';
    html+=`<div class="${cls}" ${onclick}>${d}${star}</div>`;
  }
  document.getElementById('calGrid').innerHTML=html;
  document.getElementById('sumDays').textContent=sumDays;
  document.getElementById('sumItems').textContent=sumItems;
  document.getElementById('sumXp').textContent=sumXp;
}
function openDay(ds){
  const h=S.history[ds]; if(!h) return;
  document.getElementById('popTitle').textContent=ds+' の記録';
  const rows=QUESTS.map(Q=>`<div class="poprow"><span>${Q.emoji} ${Q.name}</span><b>${h.counts[Q.id]} ${Q.unit}</b></div>`).join('');
  document.getElementById('popBody').innerHTML=
    `<div class="poprow"><span>完了クエスト</span><b>${h.done} / 3</b></div>`+rows+
    `<div class="poprow"><span>獲得XP</span><b style="color:var(--gold)">${h.xp} XP</b></div>`;
  document.getElementById('pop').classList.add('on');
}
function closePop(){document.getElementById('pop').classList.remove('on');}

/* ============ Boot ============ */
rollover();
render();
if('serviceWorker' in navigator){ navigator.serviceWorker.register('sw.js').catch(()=>{}); }
// re-check rollover when app returns to foreground
document.addEventListener('visibilitychange',()=>{ if(!document.hidden){ rollover(); render(); }});
</script>
